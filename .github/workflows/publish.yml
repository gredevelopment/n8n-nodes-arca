name: Publish to npm
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publisher requires 11.5.1+)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - run: npm run build

      - run: npm run lint

      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "**Published to npm:** https://www.npmjs.com/package/n8n-nodes-arca/v/${{ github.ref_name }}

          See [CHANGELOG](https://github.com/gredevelopment/n8n-nodes-arca/blob/main/CHANGELOG.md) for details." \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
